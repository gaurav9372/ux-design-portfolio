<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — Shreyansh Gaurav</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@800&family=Inter:wght@400;500;600&family=Outfit:wght@500;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css" />
</head>

<body>
<div class="wrap" id="top">
    <header class="nav">
      <a class="brand" href="/" aria-label="Home">
        <img src="/images/image-missing.png" alt="Shreyansh Gaurav logo" />
      </a>
      <nav class="nav-right" aria-label="Primary">
        <div class="nav-links">
          <a href="/pages/about.html">About me</a>
          <a href="/pages/contact.html">Contact</a>
          <a href="/pages/blog.html">Blogs</a>
        </div>
        <a class="nav-cta" href="/pages/projects.html">
          <span>My Works</span>
        </a>
      </nav>
      <button class="burger" id="burger" aria-label="Open menu" aria-expanded="false">
        <span></span>
      </button>
    </header>

    <div class="mobile-panel" id="mobilePanel" aria-label="Mobile menu">
      <a href="/pages/about.html">About me</a>
      <a href="/pages/contact.html">Contact</a>
      <a href="/pages/blog.html">Blogs</a>
      <a href="/pages/projects.html" class="cta">My Works</a>
    </div>

    <main>
      <section class="page-hero">
        <h1>Contact</h1>
        <p class="page-desc">Let's work together.</p>
      </section>

      <section style="padding:64px var(--pad);">
        <div style="max-width:640px;margin:0 auto;">
          <form class="contact-form" style="display:flex;flex-direction:column;gap:24px;">
            <div style="display:flex;flex-direction:column;gap:8px;">
              <label for="name" style="font-family:Outfit,sans-serif;font-size:15px;text-transform:uppercase;letter-spacing:.5px;">Name</label>
              <input type="text" id="name" name="name" required style="padding:14px 16px;background:var(--bg2);border:1px solid var(--stroke);border-radius:var(--radius);color:#fff;font-size:16px;font-family:Inter,sans-serif;" />
            </div>
            <div style="display:flex;flex-direction:column;gap:8px;">
              <label for="email" style="font-family:Outfit,sans-serif;font-size:15px;text-transform:uppercase;letter-spacing:.5px;">Email</label>
              <input type="email" id="email" name="email" required style="padding:14px 16px;background:var(--bg2);border:1px solid var(--stroke);border-radius:var(--radius);color:#fff;font-size:16px;font-family:Inter,sans-serif;" />
            </div>
            <div style="display:flex;flex-direction:column;gap:8px;">
              <label for="message" style="font-family:Outfit,sans-serif;font-size:15px;text-transform:uppercase;letter-spacing:.5px;">Message</label>
              <textarea id="message" name="message" rows="6" required style="padding:14px 16px;background:var(--bg2);border:1px solid var(--stroke);border-radius:var(--radius);color:#fff;font-size:16px;font-family:Inter,sans-serif;resize:vertical;"></textarea>
            </div>
            <button type="submit" style="padding:16px 32px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--radius);font-family:Outfit,sans-serif;font-size:16px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;align-self:flex-start;">Send Message</button>
          </form>

          <div style="margin-top:64px;display:flex;flex-direction:column;gap:16px;">
            <p style="font-size:18px;color:var(--muted);">Or reach out directly:</p>
            <a href="mailto:Gauravguptasggs@gmail.com" style="font-size:20px;color:var(--accent);text-decoration:none;">Gauravguptasggs@gmail.com</a>
            <p style="font-size:16px;color:var(--muted);">Varanasi, India</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-bg" aria-hidden="true">
        <p>Varanasi,</p>
        <p>india</p>
      </div>
      <div class="block">
        <div style="display:flex;flex-direction:column;gap:16px;">
          <p class="kicker">Contact me</p>
          <a class="email" href="mailto:Gauravguptasggs@gmail.com">Gauravguptasggs@gmail.com</a>
        </div>
        <p class="desc">[TODO: Write real footer copy]</p>
      </div>
      <nav class="footer-nav" aria-label="Footer">
        <a href="/pages/about.html">About me</a>
        <a href="/pages/contact.html">Contact</a>
        <a href="/pages/projects.html">Portfolio</a>
      </nav>
      <div class="socials" aria-label="Social links">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </footer>
</div>
</body>
</html>
